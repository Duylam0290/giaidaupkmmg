<body class="text-gray-200 font-sans">

    <div class="container mx-auto p-4 md:p-8">

            <h1 id="view-tournament-name" class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-500 tracking-tighter uppercase italic">

            </h1>
            <div class="mt-2 flex justify-center items-center space-x-2">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                <span class="text-xs font-mono text-gray-500 uppercase tracking-widest">Live Updates Enabled</span>
